# Alertmanager shares the same web toolkit as Prometheus, so it supports
# the identical basic_auth_users / tls_server_config format.
# Reference: https://prometheus.io/docs/alerting/latest/security/

basic_auth_users:
  promadmin: $2y$12$REPLACE_WITH_BCRYPT_HASH_FROM_SCRIPT

