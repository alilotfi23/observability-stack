auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 744h   # 31 days - override via LOKI_RETENTION_PERIOD in .env / kept in sync manually here
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 5000
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# NOTE for future scale: once log volume outgrows a single node,
# swap `filesystem` storage for S3/GCS + move to a distributed
# target (loki-distributed Helm chart) rather than rewriting this
# config from scratch - schema_config/limits_config largely carry over.
