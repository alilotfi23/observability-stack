worker_processes auto;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name monitoring.example.com;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ---- Grafana (primary, user-facing UI) ----
    location /grafana/ {
      proxy_pass http://grafana:3000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      limit_req zone=login_limit burst=10 nodelay;
    }

    # ---- Prometheus UI/API (already has its own basic_auth via web.yml) ----
    # Exposed here only if you want it reachable without a VPN.
    # Consider leaving this commented and accessing Prometheus over an
    # internal network / VPN / SSH tunnel instead.
    # location /prometheus/ {
    #   proxy_pass https://prometheus:9090/;
    #   proxy_set_header Host $host;
    #   proxy_ssl_verify off;
    # }

    # ---- Alertmanager UI (already has its own basic_auth via web.yml) ----
    # location /alertmanager/ {
    #   proxy_pass https://alertmanager:9093/;
    #   proxy_set_header Host $host;
    #   proxy_ssl_verify off;
    # }
  }
}
